<!DOCTYPE html>
<html>
<head>
    <title>Login & Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='loginpage.css') }}">
</head>
<body>
  <div class="container">
    {% set messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <div id="loginForm" class="form active">
      <h2>Login</h2>
      <form method="POST" action="/login">
        <input type="email" name="email" placeholder="Email ID" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
        <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot Password?</a>
      </form>
      <span class="toggle-link" onclick="showForm('registerForm')">Don't have an account? Register</span>
    </div>
    <div id="registerForm" class="form">
      <h2>Register</h2>
      <form method="POST" action="/register">
        <input type="email" name="email" placeholder="Email ID" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Register</button>
      </form>
      <span class="toggle-link" onclick="showForm('loginForm')">Already have an account? Login</span>
    </div>
  </div>
  <script>
    function showForm(formId) {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.remove('active');
      document.getElementById(formId).classList.add('active');
    }
  </script>
</body>
</html>
